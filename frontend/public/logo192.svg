<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="96" cy="96" r="90" fill="url(#grad1)" stroke="#1565c0" stroke-width="3"/>
  
  <!-- Quantum Symbol (Q) -->
  <text x="96" y="120" font-family="Arial, sans-serif" font-size="105" font-weight="bold" 
        text-anchor="middle" fill="url(#grad2)">Q</text>
  
  <!-- Money Symbol ($) -->
  <text x="96" y="68" font-family="Arial, sans-serif" font-size="45" font-weight="bold" 
        text-anchor="middle" fill="url(#grad2)">$</text>
  
  <!-- Quantum Dots -->
  <circle cx="68" cy="68" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="124" cy="68" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="68" cy="124" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="124" cy="124" r="4" fill="#ffffff" opacity="0.8"/>
  
  <!-- Central Quantum Ring -->
  <circle cx="96" cy="96" r="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="96" cy="96" r="15" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
</svg>





