<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" stroke="#1565c0" stroke-width="8"/>
  
  <!-- Quantum Symbol (Q) -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="280" font-weight="bold" 
        text-anchor="middle" fill="url(#grad2)">Q</text>
  
  <!-- Money Symbol ($) -->
  <text x="256" y="180" font-family="Arial, sans-serif" font-size="120" font-weight="bold" 
        text-anchor="middle" fill="url(#grad2)">$</text>
  
  <!-- Quantum Dots -->
  <circle cx="180" cy="180" r="12" fill="#ffffff" opacity="0.8"/>
  <circle cx="332" cy="180" r="12" fill="#ffffff" opacity="0.8"/>
  <circle cx="180" cy="332" r="12" fill="#ffffff" opacity="0.8"/>
  <circle cx="332" cy="332" r="12" fill="#ffffff" opacity="0.8"/>
  
  <!-- Central Quantum Ring -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
</svg>





