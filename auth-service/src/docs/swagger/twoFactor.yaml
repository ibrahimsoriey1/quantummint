paths:
  /2fa/setup:
    post:
      tags:
        - Two-Factor Authentication
      summary: Setup two-factor authentication
      description: Generate a secret key and QR code for setting up two-factor authentication
      operationId: setupTwoFactor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Two-factor authentication setup successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  secretKey:
                    type: string
                    example: JBSWY3DPEHPK3PXP
                  qrCodeUrl:
                    type: string
                    example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKQAAACkCAYAAAAZtYVBAAAAAklEQVR4AewaftIAAAX0SURBVO3BQW4sy7LgQDJR978yR0tfBZDIKKn7/GHjF6z8wMoPrPzAyg+s/MDK...
        '400':
          description: Two-factor authentication is already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 400
                message: Two-factor authentication is already enabled
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 404
                message: User not found
        '500':
          $ref: '#/components/responses/ServerError'

  /2fa/enable:
    post:
      tags:
        - Two-Factor Authentication
      summary: Enable two-factor authentication
      description: Enable two-factor authentication after verifying the setup
      operationId: enableTwoFactor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Two-factor authentication enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Two-factor authentication enabled successfully
        '400':
          description: Invalid verification code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 400
                message: Invalid verification code
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Two-factor authentication not set up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 404
                message: Two-factor authentication not set up
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /2fa/disable:
    post:
      tags:
        - Two-Factor Authentication
      summary: Disable two-factor authentication
      description: Disable two-factor authentication after verification
      operationId: disableTwoFactor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Two-factor authentication disabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Two-factor authentication disabled successfully
        '400':
          description: Invalid verification code or two-factor authentication not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  value:
                    success: false
                    status: 400
                    message: Invalid verification code
                notEnabled:
                  value:
                    success: false
                    status: 400
                    message: Two-factor authentication is not enabled
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Two-factor authentication not set up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 404
                message: Two-factor authentication not set up
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /2fa/verify:
    post:
      tags:
        - Two-Factor Authentication
      summary: Verify two-factor authentication code
      description: Verify two-factor authentication code during login
      operationId: verifyTwoFactor
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
              properties:
                email:
                  type: string
                  format: email
                  example: john.doe@example.com
                code:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: Two-factor authentication verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid verification code or two-factor authentication not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  value:
                    success: false
                    status: 400
                    message: Invalid verification code
                notEnabled:
                  value:
                    success: false
                    status: 400
                    message: Two-factor authentication is not enabled for this user
        '404':
          description: User not found or two-factor authentication not set up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                userNotFound:
                  value:
                    success: false
                    status: 404
                    message: User not found
                twoFactorNotSetup:
                  value:
                    success: false
                    status: 404
                    message: Two-factor authentication not set up
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /2fa/backup-codes:
    get:
      tags:
        - Two-Factor Authentication
      summary: Get backup codes
      description: Get backup codes for two-factor authentication
      operationId: getBackupCodes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Backup codes retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  backupCodes:
                    type: array
                    items:
                      type: string
                    example: ["12345678", "23456789", "34567890", "45678901", "56789012"]
        '400':
          description: Two-factor authentication is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 400
                message: Two-factor authentication is not enabled
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Backup codes not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 404
                message: Backup codes not found
        '500':
          $ref: '#/components/responses/ServerError'

  /2fa/backup-codes/generate:
    post:
      tags:
        - Two-Factor Authentication
      summary: Generate new backup codes
      description: Generate new backup codes for two-factor authentication
      operationId: generateBackupCodes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Backup codes generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: New backup codes generated successfully
                  backupCodes:
                    type: array
                    items:
                      type: string
                    example: ["12345678", "23456789", "34567890", "45678901", "56789012"]
        '400':
          description: Two-factor authentication is not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 400
                message: Two-factor authentication is not enabled
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/ServerError'

  /2fa/verify-backup:
    post:
      tags:
        - Two-Factor Authentication
      summary: Verify backup code
      description: Verify backup code for two-factor authentication
      operationId: verifyBackupCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - backupCode
              properties:
                email:
                  type: string
                  format: email
                  example: john.doe@example.com
                backupCode:
                  type: string
                  example: "12345678"
      responses:
        '200':
          description: Backup code verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid backup code or two-factor authentication not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCode:
                  value:
                    success: false
                    status: 400
                    message: Invalid backup code
                notEnabled:
                  value:
                    success: false
                    status: 400
                    message: Two-factor authentication is not enabled for this user
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                status: 404
                message: User not found
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'