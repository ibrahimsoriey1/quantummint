paths:
  /documents:
    post:
      tags: [Documents]
      summary: Upload document
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded
    get:
      tags: [Documents]
      summary: List documents
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK












