version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: quantummint-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis
  redis:
    image: redis:alpine
    container_name: quantummint-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: quantummint-rabbitmq
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: quantummint-api-gateway
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - MONEY_GENERATION_SERVICE_URL=http://money-generation:3002
      - TRANSACTION_SERVICE_URL=http://transaction-service:3003
      - PAYMENT_INTEGRATION_SERVICE_URL=http://payment-integration:3004
      - KYC_SERVICE_URL=http://kyc-service:3005
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVICE_KEY=${SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      - redis
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Authentication Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: quantummint-auth-service
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/auth-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1d
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVICE_KEY=${SERVICE_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - mongodb
      - redis
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Money Generation Service
  money-generation:
    build:
      context: ./money-generation
      dockerfile: Dockerfile
    container_name: quantummint-money-generation
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/money-generation-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URI=amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - SERVICE_KEY=${SERVICE_KEY}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - TRANSACTION_SERVICE_URL=http://transaction-service:3003
    depends_on:
      - mongodb
      - rabbitmq
      - auth-service
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Transaction Service
  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: quantummint-transaction-service
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/transaction-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URI=amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - SERVICE_KEY=${SERVICE_KEY}
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - mongodb
      - rabbitmq
      - auth-service
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Payment Integration Service
  payment-integration:
    build:
      context: ./payment-integration
      dockerfile: Dockerfile
    container_name: quantummint-payment-integration
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3004
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/payment-integration-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URI=amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - SERVICE_KEY=${SERVICE_KEY}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - TRANSACTION_SERVICE_URL=http://transaction-service:3003
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ORANGE_MONEY_API_KEY=${ORANGE_MONEY_API_KEY}
      - ORANGE_MONEY_API_SECRET=${ORANGE_MONEY_API_SECRET}
      - AFRIMONEY_API_KEY=${AFRIMONEY_API_KEY}
      - AFRIMONEY_API_SECRET=${AFRIMONEY_API_SECRET}
    depends_on:
      - mongodb
      - rabbitmq
      - auth-service
      - transaction-service
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # KYC Service
  kyc-service:
    build:
      context: ./kyc-service
      dockerfile: Dockerfile
    container_name: quantummint-kyc-service
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3005
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/kyc-service?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URI=amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - SERVICE_KEY=${SERVICE_KEY}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - STORAGE_TYPE=${STORAGE_TYPE}
      - STORAGE_PATH=/usr/src/app/uploads
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
    volumes:
      - kyc_uploads:/usr/src/app/uploads
    depends_on:
      - mongodb
      - rabbitmq
      - auth-service
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantummint-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: quantummint-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api-gateway
      - frontend
    networks:
      - quantummint-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  kyc_uploads:

networks:
  quantummint-network:
    driver: bridge
