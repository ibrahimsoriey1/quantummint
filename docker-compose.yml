version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: quantummint-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: quantummint123
      MONGO_INITDB_DATABASE: quantummint
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb-init:/docker-entrypoint-initdb.d
    networks:
      - quantummint-network

  # Auth Service
  auth-service:
    build: ./auth-service
    container_name: quantummint-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:quantummint123@mongodb:27017/quantummint?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
      BCRYPT_ROUNDS: 12
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - quantummint-network

  # Money Generation Service
  money-generation:
    build: ./money-generation
    container_name: quantummint-money-gen
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGODB_URI: mongodb://admin:quantummint123@mongodb:27017/quantummint?authSource=admin
      AUTH_SERVICE_URL: http://auth-service:3001
    ports:
      - "3002:3002"
    depends_on:
      - mongodb
      - auth-service
    networks:
      - quantummint-network

  # Transaction Service
  transaction-service:
    build: ./transaction-service
    container_name: quantummint-transaction
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      MONGODB_URI: mongodb://admin:quantummint123@mongodb:27017/quantummint?authSource=admin
      AUTH_SERVICE_URL: http://auth-service:3001
    ports:
      - "3003:3003"
    depends_on:
      - mongodb
      - auth-service
    networks:
      - quantummint-network

  # Payment Integration Service
  payment-integration:
    build: ./payment-integration
    container_name: quantummint-payment
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      MONGODB_URI: mongodb://admin:quantummint123@mongodb:27017/quantummint?authSource=admin
      AUTH_SERVICE_URL: http://auth-service:3001
    ports:
      - "3004:3004"
    depends_on:
      - mongodb
      - auth-service
    networks:
      - quantummint-network

  # KYC Service
  kyc-service:
    build: ./kyc-service
    container_name: quantummint-kyc
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      MONGODB_URI: mongodb://admin:quantummint123@mongodb:27017/quantummint?authSource=admin
      AUTH_SERVICE_URL: http://auth-service:3001
    ports:
      - "3005:3005"
    depends_on:
      - mongodb
      - auth-service
    networks:
      - quantummint-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: quantummint-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      MONEY_GENERATION_SERVICE_URL: http://money-generation:3002
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
      PAYMENT_INTEGRATION_SERVICE_URL: http://payment-integration:3004
      KYC_SERVICE_URL: http://kyc-service:3005
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - money-generation
      - transaction-service
      - payment-integration
      - kyc-service
    networks:
      - quantummint-network

  # Frontend
  frontend:
    build: ./frontend
    container_name: quantummint-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - quantummint-network

volumes:
  mongodb_data:

networks:
  quantummint-network:
    driver: bridge





